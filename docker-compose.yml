version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: telegram_rpg_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: telegram_rpg_bot
    volumes:
      - mongodb_data:/data/db

  bot:
    build: .
    container_name: telegram_rpg_bot
    depends_on:
      - mongodb
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      MONGO_URI: mongodb://mongodb:27017
      LOG_LEVEL: INFO
      ADMIN_IDS: ${ADMIN_IDS}
    volumes:
      - ./logs:/app/logs
    restart: always

volumes:
  mongodb_data: